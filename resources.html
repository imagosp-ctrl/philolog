<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="view-transition" content="same-origin">
  <title>Resources — Philolog</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Montserrat:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Montserrat','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;color:#1f2937;background:#fff;line-height:1.6}
    .top-nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(0,0,0,0.08);padding:0 2rem;height:64px}
    .nav-container{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:100%}
    .nav-logo{display:flex;align-items:center;gap:.5rem;font-weight:600;text-decoration:none;color:inherit;font-family:'Lora',serif}
    .logo-icon{width:32px;height:32px;background:#3b82f6;border-radius:6px;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold}
    .nav-links{display:flex;align-items:center;gap:2rem;list-style:none;margin:0 auto;padding:0}
    .nav-links a{text-decoration:none;color:inherit;font-weight:500;transition:opacity 0.2s}
    .nav-links a:hover{opacity:0.7}
    .nav-links a.active{color:#3b82f6}

    .help-dropdown{position:relative;margin-left:1rem}
    .help-trigger{width:40px;height:40px;border:none;border-radius:8px;background:transparent;color:#374151;font-family:'Montserrat',sans-serif;font-weight:400;font-size:2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s ease}
    .help-trigger:hover{border-color:#3b82f6;color:#3b82f6;box-shadow:0 4px 12px rgba(59,130,246,0.15);transform:translateY(-1px)}
    .help-dropdown:hover .help-trigger{border-color:#3b82f6;color:#3b82f6;background:#f8fafc}
    .help-menu{position:absolute;top:100%;right:0;margin-top:8px;background:#ffffff;border-radius:12px;box-shadow:0 20px 25px -5px rgba(0,0,0,0.1),0 10px 10px -5px rgba(0,0,0,0.04);border:1px solid #f1f5f9;min-width:200px;opacity:0;visibility:hidden;transform:translateY(-10px);transition:all 0.3s ease;z-index:1001;padding:3px;margin:5px -3px}
    .help-menu-content{background:#ffffff;border-radius:12px;box-shadow:0 20px 25px -5px rgba(0,0,0,0.1),0 10px 10px -5px rgba(0,0,0,0.04);border:1px solid #f1f5f9;overflow:hidden}
    .help-dropdown:hover .help-menu,.help-dropdown.open .help-menu{opacity:1;visibility:visible;transform:translateY(0)}
    .help-menu::before{content:'';position:absolute;top:2px;right:15px;width:12px;height:12px;background:#ffffff;border:1px solid #f1f5f9;border-bottom:none;border-right:none;transform:rotate(45deg);z-index:1002}
    .help-menu-item{display:block;padding:12px 20px;color:#374151;text-decoration:none;font-family:'Montserrat',sans-serif;font-weight:500;font-size:14px;transition:all 0.2s ease;border-bottom:1px solid #f8fafc}
    .help-menu-item:first-child{border-radius:12px 12px 0 0}
    .help-menu-item:last-child{border-bottom:none;border-radius:0 0 12px 12px}
    .help-menu-item:hover{background:#f8fafc;color:#3b82f6;padding-left:24px}

    .framed-section{position:relative;padding:80px 40px;overflow:visible}
    .framed-section::before{content:'';position:fixed;inset:0;background-image:url('./public/images/guided-reader-pic.jpg');background-size:cover;background-position:center;opacity:.8;filter:brightness(.85);z-index:-1}
    .framed-section .framed-card{position:relative;z-index:1;max-width:820px;margin:0 auto;background:rgba(255,255,255,0.80);border-radius:30px;box-shadow:0 10px 30px rgba(16,24,40,0.08);padding:40px 44px;display:block}

    @media (max-width:768px){.framed-section{padding:40px 0}.framed-section .framed-card{padding:24px;margin:0 16px;border-radius:22px}}

    .framed-card__content{background:transparent}

    .main-title{
      font-family:'Montserrat',sans-serif;
      font-size:2.5rem;
      font-weight:700;
      color:#1f2937;
      margin-bottom:0.5rem;
      text-align:center;
    }
    .main-subtitle{
      font-family:'Inter',sans-serif;
      font-size:1.1rem;
      color:#6b7280;
      text-align:center;
      margin-bottom:3rem;
    }

    /* Resource entry */
    .resource-section{
      margin-bottom:2rem;
      padding:1.75rem 2rem;
      border-radius:16px;
      border:1px solid rgba(59,130,246,0.12);
      background:rgba(255,255,255,0.6);
    }
    .resource-section:last-child{margin-bottom:0}

    .resource-title{
      font-family:'Montserrat',sans-serif;
      font-size:1.1rem;
      font-weight:700;
      color:#1f2937;
      margin-bottom:0.4rem;
    }
    .resource-title a{
      color:#3b82f6;
      text-decoration:none;
      transition:opacity 0.2s;
    }
    .resource-title a:hover{opacity:0.75;text-decoration:underline}

    .resource-description{
      font-family:'Inter',sans-serif;
      font-size:0.97rem;
      line-height:1.75;
      color:#4b5563;
    }

    @media (max-width:768px){
      .main-title{font-size:1.8rem}
      .main-subtitle{font-size:1rem}
      .resource-section{padding:1.25rem}
      .nav-links{display:none!important}
      .nav-hamburger{display:flex!important}
      .help-dropdown{display:none}
    }
    .nav-hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;flex-direction:column;gap:5px;margin-left:.5rem}
    .nav-hamburger span{display:block;width:22px;height:2px;background:#1f2937;border-radius:2px;transition:all 0.3s}
    .nav-mobile-menu{display:none;position:absolute;top:64px;left:0;right:0;background:rgba(255,255,255,0.97);backdrop-filter:blur(10px);border-bottom:1px solid rgba(0,0,0,0.08);z-index:999;padding:1rem 2rem;flex-direction:column;gap:.75rem}
    .nav-mobile-menu.open{display:flex}
    .nav-mobile-menu a{text-decoration:none;color:#1f2937;font-weight:500;font-family:'Montserrat',sans-serif;font-size:15px;padding:.5rem 0;border-bottom:1px solid rgba(0,0,0,0.05)}
    .nav-mobile-menu a:last-child{border-bottom:none}
    .nav-mobile-menu a.active{color:#3b82f6}
    @view-transition{navigation:auto}
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <div class="logo-icon">Φ</div>
        <span>Philolog</span>
      </a>
      <ul class="nav-links">
        <li><a href="prayers.html">Prayers</a></li>
        <li><a href="apolytikia.html">Apolytikia</a></li>
        <li><a href="psalms.html">Psalms</a></li>
        <li><a href="memory.html">Memory</a></li>
        <li><a href="lexicon.html">Lexicon</a></li>
      </ul>
      <div style="display:flex;align-items:center;gap:.5rem">
        <div class="help-dropdown" id="helpDropdown">
          <button class="help-trigger" aria-label="Help menu">☰</button>
          <div class="help-menu">
            <div class="help-menu-content">
              <a href="quick_guide.html" class="help-menu-item">Quick Guide</a>
              <a href="resources.html" class="help-menu-item active">Resources</a>
              <a href="pronunciation-guide.html" class="help-menu-item">On Pronunciation</a>
              <a href="about.html" class="help-menu-item">About</a>
            </div>
          </div>
        </div>
        <button class="nav-hamburger" id="nav-hamburger" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
    <div class="nav-mobile-menu" id="nav-mobile-menu">
      <a href="prayers.html">Prayers</a>
      <a href="apolytikia.html">Apolytikia</a>
      <a href="psalms.html">Psalms</a>
      <a href="memory.html">Memory</a>
      <a href="lexicon.html">Lexicon</a>
      <a href="pronunciation-guide.html">On Pronunciation</a>
      <a href="resources.html" class="active">Resources</a>
    </div>
  </nav>

  <section class="framed-section" style="margin-top:64px">
    <div class="framed-card">
      <div class="framed-card__content">

        <h1 class="main-title">Resources</h1>
        <p class="main-subtitle">Recommended links and references</p>

        <!-- Resource entries will go here -->
        <div class="resource-section">
          <p class="resource-description" style="color:#9ca3af;font-style:italic">Links and descriptions coming soon.</p>
        </div>

      </div>
    </div>
  </section>

  <script>
    document.getElementById('nav-hamburger').addEventListener('click', () => {
      document.getElementById('nav-mobile-menu').classList.toggle('open');
    });
    document.addEventListener('DOMContentLoaded', function() {
      const helpDropdown = document.getElementById('helpDropdown');
      const helpTrigger = helpDropdown && helpDropdown.querySelector('.help-trigger');
      if (helpTrigger) {
        helpTrigger.addEventListener('click', function(e) {
          e.stopPropagation();
          helpDropdown.classList.toggle('open');
        });
        document.addEventListener('click', function(e) {
          if (!helpDropdown.contains(e.target)) {
            helpDropdown.classList.remove('open');
          }
        });
      }
    });
  </script>
</body>
</html>
