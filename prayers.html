<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="view-transition" content="same-origin">
  <title>Prayers — Philolog</title>
  <script>(function(){var t=localStorage.getItem('philolog-theme');if(t==='dark'||(t===null&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark-theme');}})();</script>
  <link rel="stylesheet" href="theme.css">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Montserrat:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Base styles */
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;scrollbar-gutter:stable}
    body{font-family:'Montserrat','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;color:#1f2937;background:#fff;line-height:1.6}

    /* Header Navigation */
    .top-nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(0,0,0,0.08);padding:0 2rem;height:64px}
    .nav-container{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:100%}
    .nav-logo{display:flex;align-items:center;gap:.5rem;font-weight:600;text-decoration:none;color:inherit;font-family:'Lora',serif}
    .logo-icon{width:32px;height:32px;background:#3b82f6;border-radius:6px;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold}
    .nav-links{display:flex;align-items:center;gap:2rem;list-style:none;margin:0 auto;padding:0}
    .nav-links a{text-decoration:none;color:inherit;font-weight:500;transition:opacity 0.2s}
    .nav-links a:hover{opacity:0.7}
    .nav-links a.active{color:#3b82f6}

    /* Help Dropdown */
    .help-dropdown{position:relative;margin-left:1rem}
    .help-trigger{width:40px;height:40px;border:none;border-radius:8px;background:transparent;color:#374151;font-family:'Montserrat',sans-serif;font-weight:400;font-size:2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s ease}
    .help-trigger:hover{border-color:#3b82f6;color:#3b82f6;box-shadow:0 4px 12px rgba(59,130,246,0.15);transform:translateY(-1px)}
    .help-dropdown:hover .help-trigger{border-color:#3b82f6;color:#3b82f6;background:#f8fafc}
    .help-menu{position:absolute;top:100%;right:0;margin-top:8px;background:#ffffff;border-radius:12px;box-shadow:0 20px 25px -5px rgba(0,0,0,0.1),0 10px 10px -5px rgba(0,0,0,0.04);border:1px solid #f1f5f9;min-width:200px;opacity:0;visibility:hidden;transform:translateY(-10px);transition:all 0.3s ease;z-index:1001;padding:3px;margin:5px -3px}
    .help-menu-content{background:#ffffff;border-radius:12px;box-shadow:0 20px 25px -5px rgba(0,0,0,0.1),0 10px 10px -5px rgba(0,0,0,0.04);border:1px solid #f1f5f9;overflow:hidden}
    .help-dropdown:hover .help-menu{opacity:1;visibility:visible;transform:translateY(0)}
    .help-menu::before{content:'';position:absolute;top:2px;right:15px;width:12px;height:12px;background:#ffffff;border:1px solid #f1f5f9;border-bottom:none;border-right:none;transform:rotate(45deg);z-index:1002}
    .help-menu-item{display:block;padding:12px 20px;color:#374151;text-decoration:none;font-family:'Montserrat',sans-serif;font-weight:500;font-size:14px;transition:all 0.2s ease;border-bottom:1px solid #f8fafc}
    .help-menu-item:hover{background:#f8fafc;color:#3b82f6;padding-left:24px}

    /* Fixed background */
    .hero-background{position:fixed;top:0;left:0;width:100%;height:100%;background-image:url('./public/images/guided-reader-pic.jpg');background-size:cover;background-position:center;opacity:.8;filter:brightness(.85);z-index:-2}
    .hero-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:transparent;z-index:-1}

    /* Framed section */
    .framed-section{position:relative;padding:80px 40px;overflow:visible;min-height:calc(100vh - 64px)}
    .framed-section::before{display:none}
    .framed-section .framed-card{position:relative;z-index:1;max-width:1140px;margin:0 auto;background:rgba(255,255,255,0.80);border-radius:30px;box-shadow:0 10px 30px rgba(16,24,40,0.08);padding:48px;display:block}

    /* Layout */
    .reader-container{display:grid;grid-template-columns:240px 1px 1fr;gap:0;min-height:600px}

    /* Sidebar */
    .reader-sidebar{padding:32px 24px;background:transparent;border-right:1px solid rgba(0,0,0,0.06);overflow-y:auto;max-height:calc(100vh - 200px)}
    .sidebar-title{font-family:'Lora',serif;font-size:20px;font-weight:600;color:#1f2937;margin-bottom:4px}
    .sidebar-subtitle{font-family:'Montserrat',sans-serif;font-size:12px;font-style:italic;color:#9ca3af;margin-bottom:24px}
    .text-list{display:flex;flex-direction:column;gap:4px}
    .text-item{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:400;color:#374151;cursor:pointer;padding:10px 14px;border-radius:8px;transition:all 0.2s ease;line-height:1.4}
    .text-item:hover{color:#3b82f6;background:rgba(59,130,246,0.06);transform:translateX(2px)}
    .text-item.active{color:#3b82f6;font-weight:500;background:rgba(59,130,246,0.08)}

    /* Divider */
    .reader-divider{width:1px;background:rgba(59,130,246,0.14);height:calc(100% - 80px);justify-self:center;align-self:center;border-radius:1px}

    /* Main reader area */
    .reader-main{padding:1.5rem 2.5rem;overflow-y:auto;max-height:calc(100vh - 300px)}
    
    /* Header Flexbox for Title and Button */
    .reader-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; border-bottom: 1px solid rgba(0,0,0,0.06); padding-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .reader-title{font-family:'Lora',serif;font-size:28px;font-weight:600;color:#1f2937;margin-bottom:6px}
    .reader-subtitle{font-family:'Montserrat',sans-serif;font-size:13px;color:#9ca3af;font-style:italic}

    /* Chant Button */
    .play-chant-btn { display: inline-flex; align-items: center; gap: 8px; background: rgba(59,130,246,0.1); color: #3b82f6; border: 1px solid rgba(59,130,246,0.2); padding: 8px 16px; border-radius: 20px; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .play-chant-btn:hover { background: #3b82f6; color: #fff; transform: translateY(-1px); box-shadow: 0 4px 10px rgba(59,130,246,0.2); }

    /* Greek text */
    .greek-text{font-family:'Lora',serif;font-size:22px;font-weight:300;line-height:2.4;color:#1f2937}
    .word-token{cursor:pointer;padding:3px 2px;margin:0 1px;border-radius:4px;transition:background 0.15s ease;display:inline}
    .word-token:hover{background:rgba(59,130,246,0.12)}
    .rubric-label{font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#6b7280;margin:1rem 0 .25rem;font-family:'Montserrat',sans-serif}

    /* Gloss panel */
    .gloss-panel{position:fixed;top:80px;right:32px;width:280px;background:#ffffff;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,0.12);border:1px solid #f1f5f9;padding:20px 22px;z-index:500;opacity:0;visibility:hidden;transition:opacity 0.2s ease,visibility 0.2s ease}
    .gloss-panel.visible{opacity:1;visibility:visible}
    .gloss-close{display:none;position:absolute;top:10px;right:12px;width:24px;height:24px;border:none;background:none;font-size:18px;color:#9ca3af;cursor:pointer;line-height:1;padding:0;align-items:center;justify-content:center;}
    .gloss-close:hover{color:#374151;}
    @media(max-width:768px){.gloss-close{display:flex;}}
    .gloss-lemma{font-family:'Lora',serif;font-size:26px;font-weight:600;color:#1f2937;margin-bottom:2px}
    .gloss-pronunciation{font-family:'Montserrat',sans-serif;font-size:13px;color:#9ca3af;font-style:italic;margin-bottom:10px}
    .gloss-translation{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:500;color:#374151;margin-bottom:8px}
    .gloss-meta{font-family:'Montserrat',sans-serif;font-size:12px;color:#9ca3af}
    .gloss-strong{font-size:11px;color:#c7d2fe;margin-left:6px}

    /* Floating Video Player */
    .floating-video-player { position: fixed; bottom: 30px; right: 30px; width: 340px; background: #fff; border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,0.2); z-index: 1050; overflow: hidden; display: none; flex-direction: column; border: 1px solid rgba(0,0,0,0.05); transform: translateY(20px); opacity: 0; transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1), transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .floating-video-player.show { display: flex; transform: translateY(0); opacity: 1; }
    .floating-video-player.minimized .iframe-container { display: none; }
    .video-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #1f2937; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 500; cursor: grab; user-select: none; touch-action: none; }
    .video-header:active { cursor: grabbing; }
    .video-header-btns { display: flex; gap: 6px; align-items: center; }
    .minimize-video-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: background 0.2s; }
    .minimize-video-btn:hover { background: rgba(255,255,255,0.25); }
    .close-video-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: background 0.2s; }
    .close-video-btn:hover { background: #ef4444; }
    .iframe-container { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
    .iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

    /* Empty state */
    .empty-state{text-align:center;padding:80px 20px;color:#9ca3af}
    .empty-state-icon{font-size:48px;margin-bottom:16px;opacity:0.4}
    .empty-state-text{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:500;color:#6b7280;margin-bottom:8px}
    .empty-state-sub{font-family:'Montserrat',sans-serif;font-size:13px;color:#9ca3af}

    /* Sidebar toggle (mobile) */
    .sidebar-toggle{display:none;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:500;padding:10px 16px;border:none;cursor:pointer;background:transparent;color:#374151;margin-bottom:1rem;width:100%;text-align:left;transition:all 0.2s ease}
    .sidebar-toggle:hover{color:#3b82f6}

    .nav-hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;flex-direction:column;gap:5px;margin-left:.5rem}
    .nav-hamburger span{display:block;width:22px;height:2px;background:#1f2937;border-radius:2px;transition:all 0.3s}
    .nav-mobile-menu{display:none;position:fixed;top:64px;left:0;right:0;background:rgba(255,255,255,0.97);backdrop-filter:blur(10px);border-bottom:1px solid rgba(0,0,0,0.08);z-index:1001;padding:1rem 2rem;flex-direction:column;gap:.75rem}
    .nav-mobile-menu.open{display:flex}
    .nav-mobile-menu a{text-decoration:none;color:#1f2937;font-weight:500;font-family:'Montserrat',sans-serif;font-size:15px;padding:.5rem 0;border-bottom:1px solid rgba(0,0,0,0.05)}
    .nav-mobile-menu a:last-child{border-bottom:none}
    .nav-mobile-menu a.active{color:#3b82f6}

    html,body{height:100%;min-height:100dvh}

    @media(max-width:768px){
      .framed-section{padding:40px 0}
      .framed-section .framed-card{padding:24px;margin:0 16px;margin-bottom:calc(56px + env(safe-area-inset-bottom));border-radius:22px}
      .reader-container{grid-template-columns:1fr}
      .reader-sidebar{border-right:none;border-bottom:1px solid rgba(0,0,0,0.06);padding-bottom:1rem;max-height:none;display:none}
      .reader-sidebar.open{display:block}
      .reader-divider{display:none}
      .sidebar-toggle{display:none}
      .mobile-service-bar{display:flex}
      .nav-links{display:none!important}
      .nav-hamburger{display:flex!important}
      .help-dropdown{display:none}
      .gloss-panel{right:12px;width:240px}
      .floating-video-player{width:calc(100vw - 40px);max-width:300px;bottom:calc(72px + env(safe-area-inset-bottom));right:20px;top:auto;left:auto;}
      .reader-header{flex-direction:column;}
      .reader-main{padding:1rem 1.25rem;max-height:none;}
    }
    @media(max-width:480px){
      .framed-section .framed-card{padding:16px;margin:0 8px;border-radius:16px}
      .reader-title{font-size:22px;}
      .greek-text{font-size:18px;}
    }

    /* === DESKTOP THEME TOGGLE === */
    #theme-toggle{background:none;border:1px solid rgba(0,0,0,0.1);border-radius:8px;width:36px;height:36px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;color:#374151}
    #theme-toggle:hover{border-color:#3b82f6;transform:translateY(-1px)}
    @media(max-width:768px){#theme-toggle{display:none}}

    /* === MOBILE BOTTOM SERVICE BAR === */
    .mobile-service-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.97);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:1px solid rgba(0,0,0,0.08);z-index:900;height:calc(56px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);align-items:stretch}
    .mobile-nav-btn{flex:1;border:none;background:none;font-family:'Montserrat',sans-serif;font-size:.85rem;font-weight:600;color:#374151;cursor:pointer;padding:0 16px;transition:color 0.2s;border-top:2.5px solid transparent;display:flex;align-items:center;gap:6px;justify-content:center}
    .mobile-nav-btn:active,.mobile-nav-btn.active{color:#3b82f6;border-top-color:#3b82f6}
    .mobile-theme-toggle{width:52px;flex-shrink:0;border:none;background:none;font-size:1.15rem;color:#374151;cursor:pointer;border-top:2.5px solid transparent;border-left:1px solid rgba(0,0,0,0.07);display:flex;align-items:center;justify-content:center;transition:color 0.2s;padding-bottom:0}

    /* === MOBILE DRAWER === */
    .mobile-drawer{position:fixed;bottom:calc(56px + env(safe-area-inset-bottom));left:0;right:0;max-height:60vh;background:rgba(255,255,255,0.98);border-radius:18px 18px 0 0;z-index:895;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);overflow-y:auto;padding:4px 0 16px;box-shadow:0 -4px 24px rgba(0,0,0,0.12)}
    .mobile-drawer.open{transform:translateY(0)}
    .mobile-drawer-handle{width:36px;height:4px;background:#e5e7eb;border-radius:2px;margin:10px auto 12px}
    .mobile-drawer-overlay{position:fixed;inset:0;bottom:calc(56px + env(safe-area-inset-bottom));background:rgba(0,0,0,0.3);z-index:894;visibility:hidden;opacity:0;transition:opacity 0.3s}
    .mobile-drawer-overlay.open{visibility:visible;opacity:1}
    .drawer-section-heading{font-family:'Lora',serif;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#9ca3af;padding:10px 20px 5px}
    .drawer-item-link{display:block;padding:13px 20px;font-family:'Montserrat',sans-serif;font-size:.95rem;font-weight:500;color:#374151;text-decoration:none;cursor:pointer;border-bottom:1px solid rgba(0,0,0,0.04);transition:color 0.15s}
    .drawer-item-link:last-child{border-bottom:none}
    .drawer-item-link:hover,.drawer-item-link.active{color:#3b82f6}
    .drawer-item-link.active{font-weight:600}

    /* === DARK MODE OVERRIDES === */
    .dark-theme .greek-text,.dark-theme .word-token{color:#e5e7eb!important}
    .dark-theme .reader-title{color:#f3f4f6!important}
    .dark-theme .reader-subtitle,.dark-theme .sidebar-subtitle,.dark-theme .rubric-label{color:#9ca3af!important}
    .dark-theme .gloss-lemma{color:#f3f4f6!important}
    .dark-theme .gloss-translation{color:#e5e7eb!important}
    .dark-theme .gloss-panel{background:#1e293b!important;border-color:#334155!important}
    .dark-theme .top-nav{background:rgba(15,23,42,0.95)!important;border-bottom-color:rgba(255,255,255,0.08)!important}
    .dark-theme .nav-logo,.dark-theme .nav-links a{color:#e5e7eb!important}
    .dark-theme .nav-hamburger span{background:#e5e7eb!important}
    .dark-theme .framed-card{background:rgba(15,23,42,0.82)!important}
    .dark-theme .sidebar-title,.dark-theme .text-item{color:#d1d5db!important}
    .dark-theme .text-item.active,.dark-theme .text-item:hover{color:#60a5fa!important;background:rgba(96,165,250,0.1)!important}
    .dark-theme .reader-divider{background:rgba(96,165,250,0.2)!important}
    .dark-theme .mobile-service-bar{background:rgba(15,23,42,0.97)!important;border-top-color:rgba(255,255,255,0.08)!important}
    .dark-theme .mobile-nav-btn,.dark-theme .mobile-theme-toggle{color:#e5e7eb!important}
    .dark-theme .mobile-nav-btn.active,.dark-theme .mobile-nav-btn:active{color:#60a5fa!important;border-top-color:#60a5fa!important}
    .dark-theme .mobile-theme-toggle{border-left-color:rgba(255,255,255,0.08)!important}
    .dark-theme .mobile-drawer{background:rgba(15,23,42,0.98)!important}
    .dark-theme .mobile-drawer-handle{background:#334155!important}
    .dark-theme .drawer-section-heading{color:#64748b!important}
    .dark-theme .drawer-item-link{color:#d1d5db!important;border-bottom-color:rgba(255,255,255,0.04)!important}
    .dark-theme .drawer-item-link.active,.dark-theme .drawer-item-link:hover{color:#60a5fa!important}

  /* === MOBILE LANDSCAPE TWEAKS === */
    @media (max-width: 932px) and (orientation: landscape) {
      /* 1. Shrink the top nav and margins to save vertical space */
      .top-nav { height: 44px; padding: 0 1rem; }
      .framed-section { margin-top: 44px !important; padding: 12px 0; min-height: calc(100dvh - 44px); }
      
      /* 2. Respect the device notch/camera using safe-area-inset */
      .framed-section .framed-card {
        padding: 16px 24px;
        margin-left: env(safe-area-inset-left);
        margin-right: env(safe-area-inset-right);
        margin-bottom: calc(64px + env(safe-area-inset-bottom));
      }

      /* 3. Adjust the Bottom Pill to avoid the notch and get slightly thinner */
      .mobile-pill-bar {
        height: 48px;
        bottom: calc(8px + env(safe-area-inset-bottom));
        left: calc(16px + env(safe-area-inset-left));
        right: calc(16px + env(safe-area-inset-right));
      }

      /* 4. Constrain the Definition Popup so it doesn't run off the bottom of the screen */
      .gloss-panel {
        top: 52px;
        max-height: calc(100dvh - 120px);
        overflow-y: auto;
        right: calc(12px + env(safe-area-inset-right));
      }

      /* 5. Maximize the Drawer (Menu) height so users can actually scroll it */
      .mobile-drawer {
        max-height: 85dvh;
        bottom: calc(64px + env(safe-area-inset-bottom));
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      
      /* 6. Shrink the Video Player for the smaller vertical screen */
      .floating-video-player {
        width: 280px;
        bottom: calc(64px + env(safe-area-inset-bottom));
        right: calc(10px + env(safe-area-inset-right));
      }
    }

  @view-transition { navigation: auto; }
  </style>
</head>

  <section class="framed-section" style="margin-top:64px">
    <div class="framed-card">

      <div class="gloss-panel" id="gloss-panel">
        <button class="gloss-close" id="gloss-close" aria-label="Close">×</button>
        <div class="gloss-lemma" id="gloss-lemma"></div>
        <div class="gloss-pronunciation" id="gloss-pronunciation"></div>
        <div class="gloss-translation" id="gloss-translation"></div>
        <div class="gloss-meta" id="gloss-meta"></div>
      </div>

      <button class="sidebar-toggle" id="sidebar-toggle">☰ Select Prayer</button>

      <div class="reader-container">

        <div class="reader-sidebar" id="reader-sidebar">
          <div class="sidebar-title">Prayers</div>
          <div class="sidebar-subtitle"></div>
          <div class="text-list" id="text-list"></div>
        </div>

        <div class="reader-divider" aria-hidden="true"></div>

        <div class="reader-main" id="reader-main">
          <div class="empty-state" id="empty-state">
            <div class="empty-state-icon">☩</div>
            <div class="empty-state-text">Select a prayer from the left</div>
            <div class="empty-state-sub">Hover over any word to see its definition</div>
          </div>
          
          <div id="text-content" style="display:none">
            <div class="reader-header">
              <div>
                <div class="reader-title" id="text-title"></div>
                <div class="reader-subtitle" id="text-subtitle"></div>
              </div>
              <div id="chant-btn-container">
                </div>
            </div>
            <div class="greek-text" id="greek-text-body"></div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <div class="floating-video-player" id="floating-video-player">
    <div class="video-header" id="video-drag-handle">
      <span id="video-header-title">Chant</span>
      <div class="video-header-btns">
        <button class="minimize-video-btn" id="minimize-video-btn" title="Minimize">—</button>
        <button class="close-video-btn" id="close-video-btn">✕</button>
      </div>
    </div>
    <div class="iframe-container" id="video-iframe-container">
      </div>
  </div>

  <!-- Mobile bottom navigation bar -->
  <div class="mobile-service-bar" id="mobile-service-bar">
    <button class="mobile-nav-btn" id="mobile-drawer-btn" aria-label="Show prayer list">
      <span style="font-size:1.1rem">☰</span> Prayers
    </button>
    <button class="mobile-theme-toggle" aria-label="Switch to dark mode" title="Switch to dark mode">🌙</button>
  </div>

  <div class="mobile-drawer" id="mobile-drawer">
    <div class="mobile-drawer-handle"></div>
    <div id="mobile-drawer-content"></div>
  </div>
  <div class="mobile-drawer-overlay" id="mobile-drawer-overlay"></div>

  <script>
    // Hamburger menu toggle
    document.getElementById('nav-hamburger').addEventListener('click', function() {
      document.getElementById('nav-mobile-menu').classList.toggle('open');
    });

    // Mobile drawer logic
    var mobileDrawer = document.getElementById('mobile-drawer');
    var mobileOverlay = document.getElementById('mobile-drawer-overlay');
    var mobileDrawerBtn = document.getElementById('mobile-drawer-btn');

    function openMobileDrawer() {
      mobileDrawer.classList.add('open');
      mobileOverlay.classList.add('open');
      mobileDrawerBtn.classList.add('active');
    }
    function closeMobileDrawer() {
      mobileDrawer.classList.remove('open');
      mobileOverlay.classList.remove('open');
      mobileDrawerBtn.classList.remove('active');
    }
    function toggleMobileDrawer() {
      mobileDrawer.classList.contains('open') ? closeMobileDrawer() : openMobileDrawer();
    }
    mobileDrawerBtn.addEventListener('click', toggleMobileDrawer);
    mobileOverlay.addEventListener('click', closeMobileDrawer);
  </script>
  <script>
  (function(){

    // Added 'youtubeId' fields. Replace with real IDs.
    const prayers = [
      { name: 'O Heavenly King', file: 'heavenly_king.json', youtubeId: '00BMpsfgwQQ' },
      { name: 'Jesus Prayer', file: 'jesus_prayer.json'  },
      { name: 'Our Father', file: 'lords_prayer.json', youtubeId: '61KFmiFrp78' },
      { name: 'Trisagion Prayers', file: 'trisagion.json' },
      { name: 'O Gladsome Light', file: 'gladsome_light.json' , youtubeId: 'tt5YoppU0AY'},
      { name: 'The Creed', file: 'the_creed.json', youtubeId: 'nlV1_99lALo' },
      { name: 'It Is Truly Meet', file: 'it_is_truly_meet.json', youtubeId: '6gI-U7BHDrI' },
      { name: 'Champion Leader', file: 'to_thee_the_champion_leader.json', youtubeId: 'fQRzc8dqBEM' },
    ];

    let glossTimer = null;

    // DOM Elements for Video
    const videoPlayer = document.getElementById('floating-video-player');
    const videoIframeContainer = document.getElementById('video-iframe-container');
    const closeVideoBtn = document.getElementById('close-video-btn');
    const minimizeVideoBtn = document.getElementById('minimize-video-btn');
    const videoHeaderTitle = document.getElementById('video-header-title');
    const chantBtnContainer = document.getElementById('chant-btn-container');
    const dragHandle = document.getElementById('video-drag-handle');

    // Minimize toggle
    minimizeVideoBtn.addEventListener('click', () => {
      videoPlayer.classList.toggle('minimized');
      minimizeVideoBtn.textContent = videoPlayer.classList.contains('minimized') ? '▲' : '—';
    });

    // Drag to move (mouse)
    let isDragging = false, dragStartX, dragStartY, playerStartX, playerStartY;
    dragHandle.addEventListener('mousedown', (e) => {
      if (e.target === closeVideoBtn || e.target === minimizeVideoBtn) return;
      isDragging = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      const rect = videoPlayer.getBoundingClientRect();
      playerStartX = rect.left;
      playerStartY = rect.top;
      videoPlayer.style.right = 'auto';
      videoPlayer.style.bottom = 'auto';
      videoPlayer.style.left = playerStartX + 'px';
      videoPlayer.style.top = playerStartY + 'px';
      e.preventDefault();
    });
    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - dragStartX;
      const dy = e.clientY - dragStartY;
      videoPlayer.style.left = Math.max(0, Math.min(window.innerWidth - videoPlayer.offsetWidth, playerStartX + dx)) + 'px';
      videoPlayer.style.top = Math.max(0, Math.min(window.innerHeight - videoPlayer.offsetHeight, playerStartY + dy)) + 'px';
    });
    document.addEventListener('mouseup', () => { isDragging = false; });

    // Drag to move (touch)
    dragHandle.addEventListener('touchstart', (e) => {
      if (e.target === closeVideoBtn || e.target === minimizeVideoBtn) return;
      const touch = e.touches[0];
      isDragging = true;
      dragStartX = touch.clientX;
      dragStartY = touch.clientY;
      const rect = videoPlayer.getBoundingClientRect();
      playerStartX = rect.left;
      playerStartY = rect.top;
      videoPlayer.style.right = 'auto';
      videoPlayer.style.bottom = 'auto';
      videoPlayer.style.left = playerStartX + 'px';
      videoPlayer.style.top = playerStartY + 'px';
      e.preventDefault();
    }, { passive: false });
    document.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      const touch = e.touches[0];
      const dx = touch.clientX - dragStartX;
      const dy = touch.clientY - dragStartY;
      videoPlayer.style.left = Math.max(0, Math.min(window.innerWidth - videoPlayer.offsetWidth, playerStartX + dx)) + 'px';
      videoPlayer.style.top = Math.max(0, Math.min(window.innerHeight - videoPlayer.offsetHeight, playerStartY + dy)) + 'px';
    }, { passive: false });
    document.addEventListener('touchend', () => { isDragging = false; });

    // Build sidebar + mobile drawer
    const textList = document.getElementById('text-list');
    const mobileDrawerContent = document.getElementById('mobile-drawer-content');

    const drawerHeading = document.createElement('div');
    drawerHeading.className = 'drawer-section-heading';
    drawerHeading.textContent = 'Daily Prayers';
    mobileDrawerContent.appendChild(drawerHeading);

    prayers.forEach(prayer => {
      // Desktop sidebar item
      const item = document.createElement('div');
      item.className = 'text-item';
      item.textContent = prayer.name;
      item.addEventListener('click', () => loadPrayer(prayer, item));
      textList.appendChild(item);

      // Mobile drawer item
      const drawerItem = document.createElement('div');
      drawerItem.className = 'drawer-item-link';
      drawerItem.textContent = prayer.name;
      drawerItem.addEventListener('click', () => {
        if (typeof closeMobileDrawer === 'function') closeMobileDrawer();
        loadPrayer(prayer, item);
      });
      mobileDrawerContent.appendChild(drawerItem);
      item._drawerItem = drawerItem;
      drawerItem._sidebarItem = item;
    });

    async function loadPrayer(prayer, sidebarItem) {
      document.querySelectorAll('.text-item').forEach(el => el.classList.remove('active'));
      if (sidebarItem) sidebarItem.classList.add('active');

      document.querySelectorAll('.drawer-item-link').forEach(el => el.classList.remove('active'));
      if (sidebarItem && sidebarItem._drawerItem) sidebarItem._drawerItem.classList.add('active');

      const mobileCurrentText = document.getElementById('mobile-current-text');
      if (mobileCurrentText) mobileCurrentText.textContent = prayer.name;

      try {
        const res = await fetch(`./texts/${prayer.file}`);
        if (!res.ok) throw new Error(res.status);
        const data = await res.json();

        // UI Swaps
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('text-content').style.display = 'block';
        document.getElementById('text-title').textContent = prayer.name;

        // Handle Video Button Injection
        if (prayer.youtubeId) {
          chantBtnContainer.innerHTML = `
            <button class="play-chant-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              Listen
            </button>
          `;
          chantBtnContainer.querySelector('.play-chant-btn').addEventListener('click', () => openVideo(prayer));
        } else {
          chantBtnContainer.innerHTML = '';
        }

        closeVideo(); // Close any currently playing video when switching texts
        renderText(data);
        document.getElementById('reader-sidebar').classList.remove('open');
        if (typeof closeMobileDrawer === 'function') closeMobileDrawer();
      } catch(e) {
        console.error('Could not load', prayer.file, e);
      }
    }

    function renderText(data) {
      const body = document.getElementById('greek-text-body');
      body.innerHTML = '';

      const wordsArray = Array.isArray(data) ? data : (data.words || data.tokens);

      wordsArray.forEach(entry => {
        const isPunct = entry.partOfSpeech === 'punctuation' || entry.pos === 'punct';
        const wordText = entry.word || entry.t;

        if (entry.type === 'lineBreak') {
          body.appendChild(document.createElement('br'));
          body.appendChild(document.createElement('br'));
          return;
        }

        if (entry.partOfSpeech === 'rubric') {
          const rubric = document.createElement('div');
          rubric.className = 'rubric-label';
          rubric.textContent = wordText;
          body.appendChild(rubric);
          return;
        }

        if (!wordText) return;

        if (isPunct) {
           body.appendChild(document.createTextNode(wordText));
        } else {
          const span = document.createElement('span');
          span.className = 'word-token';
          span.textContent = wordText;

          if (entry.gloss) {
            // Desktop: hover
            span.addEventListener('mouseenter', () => {
              clearTimeout(glossTimer);
              glossTimer = setTimeout(() => showGloss(entry), 400);
            });
            span.addEventListener('mouseleave', () => {
              clearTimeout(glossTimer);
              glossTimer = setTimeout(hideGloss, 300);
            });
            // Mobile: tap (touchend avoids triggering while scrolling)
            let touchMoved = false;
            span.addEventListener('touchmove', () => { touchMoved = true; }, { passive: true });
            span.addEventListener('touchstart', () => { touchMoved = false; }, { passive: true });
            span.addEventListener('touchend', (e) => {
              if (touchMoved) return;
              e.stopPropagation();
              clearTimeout(glossTimer);
              showGloss(entry);
            }, { passive: true });
          }
          body.appendChild(span);
        }

        if (!wordText.match(/[,·.;]/)) {
          body.appendChild(document.createTextNode(' '));
        }
      });
    }

    // Video Functions
    function openVideo(prayer) {
      videoHeaderTitle.textContent = `${prayer.name} Chant`;
      videoIframeContainer.innerHTML = `
        <iframe 
          src="https://www.youtube.com/embed/${prayer.youtubeId}?autoplay=1" 
          title="YouTube video player" 
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
          allowfullscreen>
        </iframe>
      `;
      videoPlayer.classList.add('show');
    }

    function closeVideo() {
      videoPlayer.classList.remove('show');
      setTimeout(() => { videoIframeContainer.innerHTML = ''; }, 300); // Wipe iframe to stop audio
    }

    closeVideoBtn.addEventListener('click', closeVideo);

    // Gloss Panel Logic
    const glossPanel   = document.getElementById('gloss-panel');
    const glossLemma   = document.getElementById('gloss-lemma');
    const glossPron    = document.getElementById('gloss-pronunciation');
    const glossTrans   = document.getElementById('gloss-translation');
    const glossMeta    = document.getElementById('gloss-meta');

    glossPanel.addEventListener('mouseenter', () => clearTimeout(glossTimer));
    glossPanel.addEventListener('mouseleave', () => { glossTimer = setTimeout(hideGloss, 200); });

    function showGloss(entry) {
      glossLemma.textContent  = entry.lemma || entry.word || entry.t;
      glossPron.textContent   = entry.pronunciation || entry.phonetic || '';
      glossTrans.textContent  = entry.gloss || '';
      const pos  = entry.partOfSpeech || entry.pos || '';
      const strg = entry.strongs ? `· ${entry.strongs}` : '';
      glossMeta.innerHTML = `${pos}<span class="gloss-strong">${strg}</span>`;
      glossPanel.classList.add('visible');
    }

    function hideGloss() {
      glossPanel.classList.remove('visible');
    }

    // Mobile: close button
    document.getElementById('gloss-close').addEventListener('click', hideGloss);

    // Mobile: tapping outside a word-token or the gloss panel dismisses it
    document.addEventListener('touchstart', function(e) {
      if (!e.target.closest('.word-token') && !e.target.closest('.gloss-panel')) {
        clearTimeout(glossTimer);
        hideGloss();
      }
    }, { passive: true });

    document.getElementById('sidebar-toggle').addEventListener('click', () => {
      document.getElementById('reader-sidebar').classList.toggle('open');
    });

  })();
  </script>
  <script src="theme.js"></script>
</body>
</html>
